sonar.projectKey=kevinsmithwebdev_kaizenquest
sonar.organization=kevinsmithwebdev

sonar.sources=app,lib,components
sonar.tests=.
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx

sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.typescript.lcov.reportPaths=coverage/lcov.info

sonar.exclusions=**/*.test.ts,**/*.test.tsx,**/node_modules/**,.next/**,prisma/migrations/**,lib/generated/**
# Match vitest coverage scope (vitest.config.ts) — UI and untested modules are analyzed but not gated on coverage.
sonar.coverage.exclusions=**/*.test.ts,**/*.test.tsx,**/*.d.ts,**/test-helpers.ts,prisma/**,lib/generated/**,components/**,app/(app)/**,app/(auth)/**,app/actions/goals/**,app/api/**,app/layout.tsx,app/page.tsx,lib/calendar/**,lib/goals/**,lib/quotes/**,lib/streak/**,lib/colors.ts,lib/navigation.ts,lib/prisma.ts,lib/session.ts,lib/utils.ts

sonar.qualitygate.wait=true
