name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Generate Prisma clients
        run: |
          yarn prisma generate
          yarn prisma generate --config apps/auth-service/prisma.config.ts
          yarn prisma generate --config apps/goals-service/prisma.config.ts
          yarn prisma generate --config apps/analytics-service/prisma.config.ts
        env:
          AUTH_DATABASE_URL: postgresql://kaizen:kaizen@localhost:15433/auth_db
          GOALS_DATABASE_URL: postgresql://kaizen:kaizen@localhost:15434/goals_db
          ANALYTICS_DATABASE_URL: postgresql://kaizen:kaizen@localhost:15435/analytics_db

      - name: Typecheck
        run: yarn typecheck

      - name: Test
        run: yarn test:coverage

      - name: Sonar
        if: env.SONAR_TOKEN != ''
        run: |
          node scripts/disable-sonar-autoscan.mjs
          yarn sonar
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy-web:
    name: Deploy web to Vercel
    needs: validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_SCOPE: ${{ secrets.VERCEL_SCOPE }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: yarn

      - name: Check Vercel token
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "::error::Missing VERCEL_TOKEN GitHub secret."
            exit 1
          fi

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Generate Prisma client
        run: yarn prisma generate

      - name: Link Vercel project
        run: |
          if [ -n "$VERCEL_ORG_ID" ] && [ -n "$VERCEL_PROJECT_ID" ]; then
            echo "Using VERCEL_ORG_ID and VERCEL_PROJECT_ID from secrets"
            exit 0
          fi
          args=(link --repo --yes)
          if [ -n "$VERCEL_SCOPE" ]; then
            args+=(--scope "$VERCEL_SCOPE")
          fi
          yarn vercel "${args[@]}"

      - name: Pull Vercel environment
        run: yarn vercel pull --yes --environment=production

      - name: Build
        run: yarn vercel build --prod

      - name: Deploy
        run: yarn vercel deploy --prebuilt --prod
