name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Generate Prisma clients
        run: |
          yarn prisma generate
          yarn prisma generate --config apps/auth-service/prisma.config.ts
          yarn prisma generate --config apps/goals-service/prisma.config.ts
          yarn prisma generate --config apps/analytics-service/prisma.config.ts
        env:
          AUTH_DATABASE_URL: postgresql://kaizen:kaizen@localhost:15433/auth_db
          GOALS_DATABASE_URL: postgresql://kaizen:kaizen@localhost:15434/goals_db
          ANALYTICS_DATABASE_URL: postgresql://kaizen:kaizen@localhost:15435/analytics_db

      - name: Typecheck
        run: yarn typecheck

      - name: Build Nest services
        run: yarn build:services

      - name: Test
        run: yarn test:coverage

      - name: Sonar
        if: env.SONAR_TOKEN != ''
        run: |
          node scripts/disable-sonar-autoscan.mjs
          yarn sonar
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
