name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Generate Prisma client
        run: yarn prisma generate

      - name: Validate
        run: yarn validate
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy:
    name: Deploy to Vercel
    needs: validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: yarn

      - name: Check Vercel secrets
        run: |
          missing=()
          [ -z "$VERCEL_TOKEN" ] && missing+=("VERCEL_TOKEN")
          [ -z "$VERCEL_ORG_ID" ] && missing+=("VERCEL_ORG_ID")
          [ -z "$VERCEL_PROJECT_ID" ] && missing+=("VERCEL_PROJECT_ID")
          if [ "${#missing[@]}" -gt 0 ]; then
            echo "::error::Missing GitHub secrets: ${missing[*]}"
            echo "VERCEL_TOKEN: https://vercel.com/account/tokens"
            echo "VERCEL_ORG_ID / VERCEL_PROJECT_ID: run 'yarn vercel link' locally, then copy orgId and projectId from .vercel/project.json"
            exit 1
          fi

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Generate Prisma client
        run: yarn prisma generate

      - name: Pull Vercel environment
        run: yarn vercel pull --yes --environment=production

      - name: Build
        run: yarn vercel build --prod

      - name: Deploy
        run: yarn vercel deploy --prebuilt --prod
