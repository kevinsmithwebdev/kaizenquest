services:
  postgres-auth:
    image: postgres:16-alpine
    container_name: kaizen-postgres-auth
    environment:
      POSTGRES_USER: kaizen
      POSTGRES_PASSWORD: kaizen
      POSTGRES_DB: auth_db
    ports:
      - "15433:5432"
    volumes:
      - postgres_auth_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kaizen -d auth_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  postgres-goals:
    image: postgres:16-alpine
    container_name: kaizen-postgres-goals
    environment:
      POSTGRES_USER: kaizen
      POSTGRES_PASSWORD: kaizen
      POSTGRES_DB: goals_db
    ports:
      - "15434:5432"
    volumes:
      - postgres_goals_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kaizen -d goals_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  postgres-analytics:
    image: postgres:16-alpine
    container_name: kaizen-postgres-analytics
    environment:
      POSTGRES_USER: kaizen
      POSTGRES_PASSWORD: kaizen
      POSTGRES_DB: analytics_db
    ports:
      - "15435:5432"
    volumes:
      - postgres_analytics_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kaizen -d analytics_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Uncomment when starting the notifications service (later phase)
  # postgres-notifications:
  #   image: postgres:16-alpine
  #   container_name: kaizen-postgres-notifications
  #   environment:
  #     POSTGRES_USER: kaizen
  #     POSTGRES_PASSWORD: kaizen
  #     POSTGRES_DB: notifications_db
  #   ports:
  #     - "5436:5432"
  #   volumes:
  #     - postgres_notifications_data:/var/lib/postgresql/data

  kafka:
    image: apache/kafka:3.9.0
    container_name: kaizen-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:29093,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:29093
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1",
        ]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 20s

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kaizen-kafka-ui
    depends_on:
      kafka:
        condition: service_started
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: kaizen
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092

volumes:
  postgres_auth_data:
  postgres_goals_data:
  postgres_analytics_data:
  # postgres_notifications_data:
  kafka_data:
